<!DOCTYPE html>
<html><head><title>Accident Alert System - Live Map</title>
<meta charset='utf-8'><meta http-equiv='refresh' content='5'>
<link rel='stylesheet' href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css'/>
<script src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js'></script>
<style>
body{margin:0;font-family:'Segoe UI',sans-serif;}
#map{height:100vh;width:100%;}
.info{position:fixed;top:20px;left:20px;background:rgba(255,255,255,0.95);
padding:20px;border-radius:12px;color:#0f172a;z-index:1000;box-shadow:0 4px 20px rgba(0,0,0,0.15);border:1px solid #e2e8f0;max-width:220px;}
.info h3{margin:0 0 15px 0;color:#2563eb;font-size:16px;}
.legend-item{display:flex;align-items:center;margin:8px 0;font-size:13px;}
.legend-dot{width:12px;height:12px;border-radius:50%;margin-right:10px;}
.stats{margin-top:15px;padding-top:15px;border-top:1px solid #e2e8f0;font-size:11px;color:#64748b;}
.hospital-marker{font-size:24px;text-shadow:0 2px 4px rgba(0,0,0,0.3);}
</style></head><body>
<div class='info'>
<h3>AI Accident Detector</h3>
<div class='legend-item'><div class='legend-dot' style='background:#e11d48'></div>Critical/At Scene</div>
<div class='legend-item'><div class='legend-dot' style='background:#f59e0b'></div>High/En Route</div>
<div class='legend-item'><div class='legend-dot' style='background:#22c55e'></div>Available</div>
<div class='legend-item'>H Hospitals</div>
<div class='stats'>Live GPS Tracking<br>Updated: 14:42:30</div>
</div>
<div id='map'></div>
<script>
var map = L.map('map').setView([13.0827, 80.2707], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
}).addTo(map);
L.marker([13.035800, 80.246400], {icon: L.divIcon({className: 'hospital-marker', html: '🏥', iconSize: [30, 30]})}).addTo(map).bindPopup('<b>Apollo Hospital</b><br>Available Beds: 15');
L.marker([13.089000, 80.210000], {icon: L.divIcon({className: 'hospital-marker', html: '🏥', iconSize: [30, 30]})}).addTo(map).bindPopup('<b>MIOT Hospital</b><br>Available Beds: 20');
L.marker([13.056900, 80.254000], {icon: L.divIcon({className: 'hospital-marker', html: '🏥', iconSize: [30, 30]})}).addTo(map).bindPopup('<b>Fortis Malar</b><br>Available Beds: 12');
L.circleMarker([13.079700, 80.243700], {radius: 8, fillColor: '#22c55e', color: '#fff', weight: 2, opacity: 1, fillOpacity: 0.9}).addTo(map).bindPopup('<b>TN01-AB-1234</b><br>Status: Available<br>Driver: Unassigned');
L.circleMarker([13.007700, 80.195700], {radius: 8, fillColor: '#e11d48', color: '#fff', weight: 2, opacity: 1, fillOpacity: 0.9}).addTo(map).bindPopup('<b>TN01-CD-5678</b><br>Status: At Scene<br>Driver: Unassigned');
L.circleMarker([13.079700, 80.243700], {radius: 8, fillColor: '#e11d48', color: '#fff', weight: 2, opacity: 1, fillOpacity: 0.9}).addTo(map).bindPopup('<b>TN01-EF-9012</b><br>Status: At Scene<br>Driver: Unassigned');
</script>
</body></html>
